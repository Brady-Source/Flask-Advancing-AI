{% extends "base.html" %}
{% from "_macros.html" import render_field %}

{% block page_content %}
<h2>Reset Your Password</h2>
<form method="post">
  {{ form.hidden_tag() }}
  {{ render_field(form.password) }}
  {{ render_field(form.password2) }}
  {{ form.submit(class="btn btn-primary") }}
</form>
{% endblock %}
